<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RELAY 2026 — Registration</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Arial, sans-serif; background: #1C2B38; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .wrap { text-align: center; padding: 20px; max-width: 420px; width: 100%; }
  .spinner { width: 36px; height: 36px; border: 3px solid rgba(255,255,255,0.15); border-top-color: #4BAE6A; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  p { color: rgba(255,255,255,0.5); font-size: 13px; }
  .chooser { display: none; }
  .chooser h2 { color: #fff; font-size: 22px; font-weight: 700; margin-bottom: 8px; }
  .chooser p { color: rgba(255,255,255,0.55); font-size: 13px; margin-bottom: 28px; }
  .choose-btns { display: flex; flex-direction: column; gap: 12px; }
  .choose-btn { display: block; width: 100%; padding: 16px 20px; border-radius: 10px; text-decoration: none; font-size: 15px; font-weight: 600; transition: all 0.2s; cursor: pointer; }
  .choose-btn-ph { background: linear-gradient(135deg, #2E7048, #4BAE6A); color: #fff; }
  .choose-btn-ph:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(75,174,106,0.35); }
  .choose-btn-intl { background: linear-gradient(135deg, #3A8BBF, #5AADD4); color: #fff; }
  .choose-btn-intl:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(58,139,191,0.35); }
  .choose-btn sub { display: block; font-size: 11px; font-weight: 400; opacity: 0.8; margin-top: 2px; }
</style>
</head>
<body>
<div class="wrap">
  <div id="loading">
    <div class="spinner"></div>
    <p>Loading registration form…</p>
  </div>
  <div class="chooser" id="chooser">
    <h2>RELAY Conference 2026</h2>
    <p>Please select the registration form that applies to you.</p>
    <div class="choose-btns">
      <a href="register-ph.html" class="choose-btn choose-btn-ph">
        🇵🇭 Philippine Attendee
        <sub>Local registration · PHP pricing</sub>
      </a>
      <a id="intlBtn" href="register-international.html" class="choose-btn choose-btn-intl">
        🌏 International Attendee
        <sub>Outside Philippines · USD $300</sub>
      </a>
    </div>
  </div>
</div>
<script>
  const PH_FORM   = 'register-ph.html';
  const INTL_FORM = 'register-international.html';
  const TIMEOUT_MS = 3000;

  async function detectAndRedirect() {
    let timedOut = false;
    const timer = setTimeout(() => {
      timedOut = true;
      // Default to PH form silently when detection times out
      window.location.replace(PH_FORM);
    }, TIMEOUT_MS);

    try {
      const res = await fetch('https://ipapi.co/json/', { signal: AbortSignal.timeout(2500) });
      if (!res.ok) throw new Error('API error');
      const data = await res.json();

      clearTimeout(timer);
      if (timedOut) return;

      const countryCode = data.country_code || '';
      const countryName = data.country_name || '';

      if (countryCode === 'PH' || countryCode === '') {
        window.location.replace(PH_FORM);
      } else {
        window.location.replace(`${INTL_FORM}?country=${encodeURIComponent(countryName)}`);
      }
    } catch (e) {
      clearTimeout(timer);
      if (!timedOut) {
        // Show chooser only if we explicitly failed (not timed out)
        document.getElementById('loading').style.display = 'none';
        document.getElementById('chooser').style.display = 'block';
      }
    }
  }

  detectAndRedirect();
</script>
</body>
</html>
